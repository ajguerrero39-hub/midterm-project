<!doctype html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GameHub Login</title>
  <link href="../styles/project-style.css" rel="stylesheet">

</head>

<body class="container">
  <!-- nav "bar" -->
  <div class="container row justify-content-md-center ">
    <div class="back-button">
      <a href="../index.html" class="btn btn-link p-0 text-secondary float-left" aria-label="Back">
        <i class="bi bi-arrow-left fs-2"></i>
      </a>
    </div>


  <!-- login "form" -->
  <div class="row justify-content-center">
    <div class="col-md-8">

      <input id="username" type="text" class="form-control p-2 fs-4 mb-2" placeholder="user name" value="Party">

      

      <div class="input-group">
        <input type="password" id="password" class="form-control p-2 fs-4 border-end-0" placeholder="password" value="Smoke">
        <button class="btn border border-rounded border-start-0" type="button" id="togglePassword"
          aria-label="Toggle password visibility">
          <i class="bi bi-eye-slash fs-4"></i>
        </button>
      </div>
    </div>
  </div>

  <div class="row mt-4 justify-content-center">
    <div class="col-md-8">
      <button id="btnLogin" class="btn btn-primary btn-lg w-100 fs-3 p-2 border border-rounded-pill" type="button" aria-label="Sign In">Sign In
      </button>
       <button id="btnLogout" class="btn btn-outline-light ms-sm-3 d-none" type="button">Logout</button>
    </div>
  </div>

    <!-- oAuth2 buttons -->

  <div class="row mb-3 justify-content-center">
    
    <div class="col-md-8">
      <button class="btn border border-2 rounded-pill p-3 text-muted bg-white w-100 fw-bold text-uppercase"
        type="button">
        <i class="bi bi-google social-icon"></i>
        SIGN IN WITH GOOGLE
      </button>
    </div>
  </div>

  <!-- Footer -->
  <div class="row justify-content-center">
    <div class="col-md-8 mb-3">
      <span class="text-muted">®️2026</span>
      
    </div>
  </div>
  

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <script src="../scripts/login-script.js"></script>

</body>
  


</html>
